<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campaign Pipeline</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #f7f7f5; color: #1a1a1a; min-height: 100vh; }
      #root { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
      input, select, textarea, button { font-family: inherit; font-size: 14px; }
      input, select, textarea { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a1a; outline: none; transition: border-color 0.15s; }
      input:focus, select:focus, textarea:focus { border-color: #666; }
      textarea { resize: vertical; line-height: 1.6; }
      button { cursor: pointer; border: none; border-radius: 8px; font-weight: 500; transition: opacity 0.15s, transform: 0.1s; }
      button:hover:not(:disabled) { opacity: 0.85; }
      button:active:not(:disabled) { transform: scale(0.98); }
      button:disabled { opacity: 0.38; cursor: not-allowed; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
